<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闘茶伍番勝負</title>
<!-- ▼OGP：公開後、REPO名を実際のリポジトリ名に書き換えてください -->
<meta property="og:title" content="闘茶伍番勝負">
<meta property="og:description" content="札を伏せて茶を当てる、利き茶勝負。少なくめくるほど高得点、全五服・26種の茶。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tat-suki-stack.github.io/REPO/toucha-gobansho.html">
<meta property="og:image" content="https://tat-suki-stack.github.io/REPO/ogp-toucha.png">
<meta name="twitter:card" content="summary_large_image">
<!-- ▼iOSホーム画面追加用 -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="闘茶">
<meta name="theme-color" content="#F6F1E3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Old+Mincho:wght@400;700&family=Yuji+Boku&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --font-mincho:'筑紫明朝 Pr6 M','FOT-筑紫明朝 Pr6 M','TsukuMin Pr6','筑紫明朝','Shippori Mincho','ヒラギノ明朝 ProN','Hiragino Mincho ProN','Yu Mincho','游明朝',serif;
  --font-mincho-old:'筑紫オールド明朝 Pr6 R','FOT-筑紫オールド明朝 Pr6 R','TsukuOldMin Pr6','筑紫オールド明朝','Zen Old Mincho','Shippori Mincho','ヒラギノ明朝 ProN',serif;
  --font-fude:'Yuji Boku','ヒラギノ明朝 ProN',serif;
  --font-mono:'DM Mono','Courier New',monospace;
  /* 六大茶類のいろ */
  --cha-kuro:#2B2A26;   /* 黒茶 */
  --cha-shiro:#F6F1E3;  /* 地色（白） */
  --cha-gofun:#EDE4CC;  /* 白茶（胡粉） */
  --cha-midori:#4C9A46; /* 緑茶 */
  --cha-ao:#3D7EA6;     /* 青茶（烏龍） */
  --cha-ki:#E8B93E;     /* 黄茶・花茶 */
  --cha-aka:#C74440;    /* 紅茶 */
  --ink:#2B2A26;
  --ink-soft:#7A7466;
  --card:#FFFDF6;
  --shadow:4px 4px 0 var(--cha-kuro);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-mincho);background:var(--cha-shiro);color:var(--ink);
  min-height:100vh;display:flex;justify-content:center;
}
body.noscroll{overflow:hidden;height:100vh}
.app{width:100%;max-width:440px;padding:22px 16px 44px}

/* ================= のれんスプラッシュ ================= */
#splash{
  position:fixed;inset:0;z-index:100;cursor:pointer;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 26% at 50% 102%, rgba(216,140,50,.32), transparent 72%),
    radial-gradient(ellipse 40% 14% at 50% 99%, rgba(236,178,86,.38), transparent 70%),
    #14120F;
}
/* のれん棒 */
.rail{
  position:absolute;top:0;left:0;right:0;height:3.4vh;z-index:2;
  background:linear-gradient(#26211A,#0D0B08);
  box-shadow:0 2px 6px rgba(0,0,0,.6);
}
/* 二巾のパネル：上半分は中央で密着、下半分は裾へ向かって隙間が開く */
.noren-panel{
  position:absolute;top:3.1vh;height:82vh;
  width:50vw;left:calc(var(--i)*50vw);
  overflow:hidden;
  transform-origin:top center;
  transition:transform .95s cubic-bezier(.5,0,.3,1),opacity .95s;
}
/* 布（全幅の絵柄をパネルごとにずらして表示） */
.cloth{
  position:absolute;top:0;height:100%;width:100vw;left:var(--off);
  background-color:#DED4BC;
  background-image:
    radial-gradient(ellipse at 50% 26%, rgba(255,255,255,.16), transparent 62%),
    linear-gradient(to bottom, rgba(120,100,60,.10), transparent 12%, transparent 88%, rgba(90,72,40,.14)),
    repeating-linear-gradient(90deg, rgba(70,60,40,.05) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.07) 0 1px, transparent 1px 3px);
}
/* しわ：パネルごとに位置の違う縦の折り目（影→光） */
.noren-panel::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(90deg, rgba(58,47,26,.20), transparent 7%, transparent 93%, rgba(58,47,26,.24)),
    var(--folds);
}
.noren-panel.p0{
  clip-path:polygon(0 0, 100% 0, 100% 48%, calc(100% - 1.8vw) 100%, 0 100%);
  --folds:
    linear-gradient(93deg, transparent 22%, rgba(58,47,26,.13) 26%, rgba(255,252,238,.15) 30%, transparent 35%),
    linear-gradient(87deg, transparent 56%, rgba(58,47,26,.10) 60%, rgba(255,252,238,.12) 64%, transparent 69%),
    linear-gradient(90deg, transparent 80%, rgba(58,47,26,.09) 84%, rgba(255,252,238,.10) 87%, transparent 91%);
}
.noren-panel.p1{
  clip-path:polygon(0 0, 100% 0, 100% 100%, 1.8vw 100%, 0 48%);
  --folds:
    linear-gradient(88deg, transparent 12%, rgba(58,47,26,.10) 16%, rgba(255,252,238,.11) 19%, transparent 24%),
    linear-gradient(92deg, transparent 40%, rgba(58,47,26,.12) 44%, rgba(255,252,238,.14) 48%, transparent 53%),
    linear-gradient(94deg, transparent 72%, rgba(58,47,26,.11) 76%, rgba(255,252,238,.12) 80%, transparent 85%);
}
/* くぐって開く */
#splash.open .noren-panel.p0{transform:rotate(-6deg) translate(-115%,-4%)}
#splash.open .noren-panel.p1{transform:rotate(6deg) translate(115%,-4%)}
/* 円相 */
.enso{
  position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
  width:min(74vw,340px);height:min(74vw,340px);
}
/* 縦書き店名 */
.splash-title{
  position:absolute;right:7vw;top:8vh;
  writing-mode:vertical-rl;font-family:var(--font-fude);
  font-size:clamp(28px,7.5vw,42px);letter-spacing:.22em;color:#1E1D1A;
}
/* ================= 本体（ポップ六色） ================= */
header{text-align:center;margin-bottom:10px}
.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.3em;color:var(--ink-soft)}
h1{
  font-family:var(--font-fude);font-weight:400;
  font-size:clamp(38px,11vw,50px);line-height:1.1;
  margin-top:6px;color:var(--ink);
}
h1 .c{display:inline-block}
h1 .c:nth-child(odd){transform:rotate(-3deg) translateY(2px)}
h1 .c:nth-child(even){transform:rotate(2.5deg) translateY(-2px)}
h1 .c:nth-child(3){font-size:.72em;color:var(--cha-aka);
  transform:rotate(-6deg) translateY(-4px);margin:0 .06em}
.subtitle{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.9;letter-spacing:.08em}
.rokushoku{display:flex;justify-content:center;gap:7px;margin-top:10px;align-items:center}
.rokushoku i{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--cha-kuro)}
.rokushoku span{font-size:9px;color:var(--ink-soft);letter-spacing:.2em;margin-left:4px}

.statusbar{
  display:flex;justify-content:space-between;align-items:baseline;
  background:var(--cha-kuro);color:var(--cha-shiro);
  border-radius:10px;box-shadow:var(--shadow);
  padding:10px 14px;margin:16px 0 18px;
}
.statusbar span{font-family:var(--font-mono);font-size:11px;color:#B9B2A0;letter-spacing:.05em}
.statusbar b{font-family:var(--font-mincho);font-size:17px;font-weight:600;color:var(--cha-shiro)}
.statusbar .pt{color:var(--cha-ki)}
.round-name{
  font-family:var(--font-mincho-old);
  text-align:center;font-size:14px;letter-spacing:.55em;padding-left:.55em;
  color:var(--ink);margin-bottom:14px;font-weight:700;
}

/* カルタ札：四枚それぞれ六色から */
.hints{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hint{perspective:900px;aspect-ratio:5/7;cursor:pointer}
.hint-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .55s ease;
}
.hint.flipped .hint-inner{transform:rotateY(180deg)}
.hint-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:10px;border:2px solid var(--cha-kuro);box-shadow:var(--shadow);
}
.hint-back{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.hint:nth-child(1) .hint-back{background:var(--cha-midori)}
.hint:nth-child(2) .hint-back{background:var(--cha-ki)}
.hint:nth-child(3) .hint-back{background:var(--cha-aka)}
.hint:nth-child(4) .hint-back{background:var(--cha-ao)}
.hint-back .h-kanji{
  font-family:var(--font-fude);font-size:56px;line-height:1;color:var(--cha-shiro);
  text-shadow:2px 3px 0 rgba(43,42,38,.35);
}
.hint:nth-child(2) .hint-back .h-kanji{color:var(--cha-kuro);text-shadow:2px 3px 0 rgba(255,255,255,.4)}
.hint-back .h-cost{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.25em;color:rgba(246,241,227,.9)}
.hint:nth-child(2) .hint-back .h-cost{color:rgba(43,42,38,.7)}
.hint-front{
  background:var(--card);
  transform:rotateY(180deg);
  padding:13px 11px;
  display:flex;justify-content:center;
}
.h-vertical{
  writing-mode:vertical-rl;text-orientation:mixed;
  height:100%;max-width:100%;
  font-family:var(--font-mincho-old);color:var(--ink);
  font-size:12px;line-height:1.9;letter-spacing:.12em;
  overflow:hidden;
}
.h-vertical .h-label{
  font-weight:700;font-size:12.5px;
  padding-right:6px;margin-left:8px;letter-spacing:.35em;
  border-right:1.5px solid var(--cha-kuro);
}
.hint:nth-child(1) .h-label{color:var(--cha-midori)}
.hint:nth-child(2) .h-label{color:#B9902A}
.hint:nth-child(3) .h-label{color:var(--cha-aka)}
.hint:nth-child(4) .h-label{color:var(--cha-ao)}
.hint.flipped{cursor:default}

.answer-title{
  font-family:var(--font-mincho-old);
  margin-top:22px;text-align:center;font-size:13px;font-weight:700;
  letter-spacing:.4em;padding-left:.4em;color:var(--ink);
}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.opt{
  font-family:var(--font-mincho);font-size:15px;font-weight:600;color:var(--ink);
  letter-spacing:.1em;
  background:var(--card);border:2px solid var(--cha-kuro);border-radius:10px;
  box-shadow:var(--shadow);
  padding:16px 4px;cursor:pointer;transition:transform .08s ease;
}
.opt:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--cha-kuro)}
.opt.correct{background:var(--cha-midori);color:var(--cha-shiro)}
.opt.wrong{background:var(--cha-aka);color:var(--cha-shiro)}
.opt:disabled{pointer-events:none}
.opt.dim{opacity:.35}

.reveal{
  display:none;margin-top:20px;background:var(--card);
  border:2px solid var(--cha-kuro);border-radius:12px;box-shadow:var(--shadow);
  padding:18px 16px;
}
.reveal .verdict{font-size:15px;font-weight:700;margin-bottom:8px;letter-spacing:.1em}
.reveal .verdict.ok{color:var(--cha-midori)}
.reveal .verdict.ng{color:var(--cha-aka)}
.reveal .tea-name{
  font-family:var(--font-fude);font-size:26px;letter-spacing:.15em;line-height:1.3;
}
.reveal .tea-cat{
  font-family:var(--font-mincho-old);
  display:inline-block;font-size:10.5px;letter-spacing:.2em;
  border:1.5px solid var(--cha-kuro);border-radius:999px;
  padding:3px 12px;margin-top:8px;font-weight:600;
}
.reveal .trivia{font-size:12.5px;line-height:2;color:#4C463A;margin-top:10px}

.gauge-wrap{margin-top:16px}
.gauge-label{font-size:10.5px;color:var(--ink-soft);letter-spacing:.2em;margin-bottom:8px;font-weight:600}
.gauge{
  position:relative;height:14px;border-radius:7px;border:2px solid var(--cha-kuro);
  background:linear-gradient(90deg,
    var(--cha-midori) 0%, var(--cha-gofun) 20%, var(--cha-ki) 40%,
    var(--cha-ao) 60%, var(--cha-aka) 80%, var(--cha-kuro) 100%);
}
.gauge-pin{
  position:absolute;top:-7px;width:6px;height:24px;border-radius:3px;
  background:var(--cha-shiro);border:2px solid var(--cha-kuro);
  transition:left .8s cubic-bezier(.2,.8,.2,1);
}
.gauge-ends{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-soft);margin-top:7px}
.gauge-note{font-size:11px;color:var(--cha-ao);margin-top:10px;line-height:1.9;font-weight:600}

.btn-primary{
  font-family:var(--font-mincho);width:100%;margin-top:18px;
  background:var(--cha-kuro);color:var(--cha-shiro);
  border:2px solid var(--cha-kuro);border-radius:10px;
  box-shadow:4px 4px 0 var(--cha-ki);
  font-size:15px;font-weight:700;letter-spacing:.3em;padding-left:.3em;
  padding-top:15px;padding-bottom:15px;cursor:pointer;
  transition:transform .08s ease;
}
.btn-primary:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--cha-ki)}

.final{display:none;text-align:center;margin-top:20px;background:var(--cha-kuro);
  color:var(--cha-shiro);
  border:2px solid var(--cha-kuro);border-radius:12px;box-shadow:4px 4px 0 var(--cha-aka);
  padding:28px 18px}
.final .eyebrow{color:#B9B2A0}
.final .score{font-family:var(--font-mono);font-size:46px;color:var(--cha-ki);margin:10px 0}
.final .rank{
  font-family:var(--font-fude);font-size:34px;letter-spacing:.2em;color:var(--cha-shiro);
}
.final p{font-size:11.5px;color:#B9B2A0;margin-top:12px;line-height:2}
.final .rokushoku{margin-top:16px}
.final .rokushoku i{border-color:var(--cha-shiro)}

footer{
  text-align:center;margin-top:34px;font-family:var(--font-mono);
  font-size:9.5px;letter-spacing:.15em;color:var(--ink-soft);
}

@media (hover:hover){
  .opt:hover{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--cha-kuro)}
  .btn-primary:hover{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--cha-ki)}
}

@media (prefers-reduced-motion: reduce){
  .hint-inner{transition:none}
  .gauge-pin{transition:none}

}
</style>
</head>
<body>
<!-- のれんスプラッシュ -->
<div id="splash">
  <div class="rail"></div>
</div>

<div class="app">
  <header>
    <div class="eyebrow">TOUCHA — FIVE ROUNDS</div>
    <h1><span class="c">闘</span><span class="c">茶</span><span class="c">伍</span><span class="c">番</span><span class="c">勝</span><span class="c">負</span></h1>
    <div class="subtitle">鎌倉武士が熱狂した利き茶勝負。<br>読み札は少なくめくるほど高得点。全五服。</div>
  </header>

  <div class="statusbar">
    <span>服 <b id="round">1</b>／5</span>
    <span>この服の点 <b class="pt" id="potential">80</b></span>
    <span>総点 <b id="score">0</b></span>
  </div>

  <div class="round-name" id="roundName">一 服 目</div>

  <div class="hints" id="hints"></div>

  <div class="answer-title">此の茶、何と見る</div>
  <div class="options" id="options"></div>

  <div class="reveal" id="reveal">
    <div class="verdict" id="verdict"></div>
    <div class="tea-name" id="teaName"></div>
    <div class="tea-cat" id="teaCat"></div>
    <div class="trivia" id="trivia"></div>
    <div class="gauge-wrap">
      <div class="gauge-label">発酵度 —— 六色の茶も、みな同じチャノキから</div>
      <div class="gauge"><div class="gauge-pin" id="gaugePin" style="left:0%"></div></div>
      <div class="gauge-ends"><span>緑（不発酵）</span><span>青（半発酵）</span><span>紅〜黒（完全・後発酵）</span></div>
      <div class="gauge-note" id="gaugeNote"></div>
    </div>
    <button class="btn-primary" id="btnNext">次の一服へ</button>
  </div>

  <div class="final" id="final">
    <div class="eyebrow">勝 敗</div>
    <div class="score" id="finalScore">0</div>
    <div class="rank" id="finalRank"></div>
    <p id="finalMsg"></p>
    <div class="rokushoku">
      <i style="background:var(--cha-midori)"></i><i style="background:var(--cha-gofun)"></i>
      <i style="background:var(--cha-ki)"></i><i style="background:var(--cha-ao)"></i>
      <i style="background:var(--cha-aka)"></i><i style="background:#4A4740"></i>
    </div>
    <button class="btn-primary" id="btnRetry">再戦する</button>
  </div>

  <footer>© 2026 Japan East India Co</footer>
</div>

<script>
// gauge: 0=不発酵 〜 100=後発酵
const TEAS=[
 // ============ 日本茶 ============
 {name:"煎茶",cat:"日本・緑茶",gauge:2,

         水色:"澄んだ黄金色から淡い黄緑",
         香味:"若葉の爽やかな香り。渋みと旨みの釣り合いが身上",

         香味:"覆い香と呼ばれる海苔のような香り。とろりと濃い旨み",

 {name:"抹茶",cat:"日本・緑茶",gauge:2,
  hints:{製法:"覆いの下で育てた葉を蒸して乾かし、揉まずに石臼で挽いて粉にする",
         水色:"鮮やかな萌黄色。茶筅で泡立てて飲む",
         香味:"覆い香と濃厚な旨み、あとを引く心地よい苦み",
         産地:"日本。京都の宇治や愛知の西尾など"},
  trivia:"茶葉を丸ごと体に取り込む飲み方。茶道という総合芸術の中心に据えられた。",

const HINT_DEFS=[
  {key:"製法",kanji:"製",label:"製法"},
  {key:"水色",kanji:"色",label:"水色"},
  {key:"香味",kanji:"香",label:"香味"},
  {key:"産地",kanji:"地",label:"産地"}
];
const POINTS=[80,60,40,20];
const KANJI_NUM=["一","二","三","四","五"];

let order=[],round=0,score=0,tea=null,flips=0,answered=false;
const $=id=>document.getElementById(id);

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function pickOptions(answer){
  // 発酵度の近い茶を優先して、まぎらわしい取り札に
  const others=TEAS.filter(t=>t.name!==answer.name)
    .sort((a,b)=>Math.abs(a.gauge-answer.gauge)-Math.abs(b.gauge-answer.gauge));
  const near=others.slice(0,8);
  const picked=shuffle(near).slice(0,3);
  return shuffle([answer,...picked]);
}

function newGame(){
  order=shuffle([...TEAS]).slice(0,5);
  round=0;score=0;
  $("final").style.display="none";
  $("score").textContent="0";
  startRound();
}

function startRound(){
  tea=order[round];flips=0;answered=false;
  $("round").textContent=round+1;
  $("roundName").textContent=KANJI_NUM[round]+" 服 目";
  $("potential").textContent=POINTS[0];
  $("reveal").style.display="none";

  const hintsEl=$("hints");hintsEl.innerHTML="";
  HINT_DEFS.forEach(h=>{
    const d=document.createElement("div");
    d.className="hint";
    d.innerHTML=
      '<div class="hint-inner">'+
        '<div class="hint-face hint-back">'+
          '<div class="h-kanji">'+h.kanji+'</div>'+
          '<div class="h-cost">FUDA</div>'+
        '</div>'+
        '<div class="hint-face hint-front">'+
          '<div class="h-vertical"><span class="h-label">'+h.label+'</span>'+tea.hints[h.key]+'</div>'+
        '</div>'+
      '</div>';
    d.onclick=()=>flipHint(d);
    hintsEl.appendChild(d);
  });

  const optEl=$("options");optEl.innerHTML="";
  pickOptions(tea).forEach(t=>{
    const b=document.createElement("button");
    b.className="opt";b.textContent=t.name;
    b.onclick=()=>answer(b,t);
    optEl.appendChild(b);
  });
}

function flipHint(el){
  if(answered||el.classList.contains("flipped"))return;
  el.classList.add("flipped");
  flips++;
  $("potential").textContent=POINTS[Math.min(flips,4)-1];
}

function answer(btn,chosen){
  if(answered)return;
  if(flips===0){ // 最低一枚はめくる。味わってこその闘茶
    flipHint(document.querySelector(".hint:not(.flipped)"));
  }
  answered=true;
  const ok=chosen.name===tea.name;
  const pts=ok?POINTS[Math.min(flips,4)-1]:0;
  score+=pts;
  $("score").textContent=score;

  document.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true;
    if(b.textContent===tea.name)b.classList.add("correct");
    else if(b===btn&&!ok)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  document.querySelectorAll(".hint").forEach(h=>h.classList.add("flipped"));

  const v=$("verdict");
  v.textContent=ok?"当たり　＋"+pts+"点":"外れ——正解は";
  v.className="verdict "+(ok?"ok":"ng");
  $("teaName").textContent=tea.name;
  $("teaCat").textContent=tea.cat;
  $("teaCat").style.background=catColor(tea.cat);
  $("teaCat").style.color=catText(tea.cat);
  $("trivia").textContent=tea.trivia;
  $("gaugeNote").textContent=tea.note;
  $("reveal").style.display="block";
  requestAnimationFrame(()=>{
    $("gaugePin").style.left="calc("+tea.gauge+"% - 2px)";
  });
  $("btnNext").textContent=(round<4)?"次の一服へ":"勝敗を見る";
  $("reveal").scrollIntoView({behavior:"smooth",block:"nearest"});
}

function next(){
  if(round<4){round++;startRound();window.scrollTo({top:0,behavior:"smooth"});}
  else showFinal();
}

function showFinal(){
  $("finalScore").textContent=score;
  const ranks=[
    [320,"茶　聖","一枚の札で見抜く境地。栄西も驚く目利きです。"],
    [240,"茶　匠","堂々たる利き茶。茶会の主役が務まります。"],
    [160,"茶　人","確かな舌。あと一歩で匠の域。"],
    [80,"見習い","お茶の世界の入口へようこそ。"],
    [0,"客　人","まずは一服。緑茶も烏龍も紅茶も、同じ木から始まっています。"]
  ];
  const r=ranks.find(x=>score>=x[0]);
  $("finalRank").textContent=r[1];
  $("finalMsg").textContent=r[2]+"（満点400点）";
  $("final").style.display="block";
  $("final").scrollIntoView({behavior:"smooth"});
}

$("btnNext").onclick=next;
$("btnRetry").onclick=()=>{newGame();window.scrollTo({top:0,behavior:"smooth"})};
newGame();

// ---- 六大茶類カラー ----
function catColor(cat){
  if(/緑茶/.test(cat))return"var(--cha-midori)";
  if(/白茶/.test(cat))return"var(--cha-gofun)";
  if(/花茶/.test(cat))return"var(--cha-ki)";
  if(/烏龍/.test(cat))return"var(--cha-ao)";
  if(/紅茶/.test(cat))return"var(--cha-aka)";
  return"var(--cha-kuro)"; // 黒茶・後発酵
}
function catText(cat){
  return /白茶|花茶/.test(cat)?"#2B2A26":"#F6F1E3";
}

     '<ellipse cx="72" cy="158" rx="11" ry="8.5" transform="rotate(28 72 158)" fill="#1E1D1A" opacity=".95"/>'+
     '<path d="M 72 159.8 A 66 66 0 1 1 122.6 162" fill="none" stroke="#1E1D1A" stroke-width="15" stroke-linecap="round" opacity=".95"/>'+
     '<path d="M 69.6 165.3 A 72 72 0 1 1 124.6 167.7" fill="none" stroke="#1E1D1A" stroke-width="4" stroke-linecap="round" opacity=".55"/>'+
     '<path d="M 74.6 154.4 A 60 60 0 1 1 120.5 156.4" fill="none" stroke="#1E1D1A" stroke-width="4" stroke-linecap="round" opacity=".5"/>'+
     '<path d="M 122.6 162 A 66 66 0 0 1 104.6 165.8" fill="none" stroke="#1E1D1A" stroke-width="7" stroke-linecap="round" opacity=".9"/>'+
     '<path d="M 104.6 165.8 A 66 66 0 0 1 93.1 165.6" fill="none" stroke="#1E1D1A" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="7 4" opacity=".65"/>'+
     '<path d="M 93.1 165.6 A 66 66 0 0 1 81.8 163.4" fill="none" stroke="#1E1D1A" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 6" opacity=".38"/>'+
     '<circle cx="128" cy="168" r="1.6" fill="#1E1D1A" opacity=".45"/>'+
     '<circle cx="88" cy="169" r="1.2" fill="#1E1D1A" opacity=".3"/>'+
   '</svg>';
  const CLOTH=ENSO+
   '<div class="splash-title">闘茶伍番勝負</div>';
  // 二巾：静止。上半分は密着、下半分の隙間はクリップ形状で表現
  for(let i=0;i<2;i++){
    const p=document.createElement("div");
    p.className="noren-panel p"+i;
    p.style.setProperty("--i",i);
    const c=document.createElement("div");
    c.className="cloth";
    c.style.setProperty("--off",(-i*50)+"vw");
    c.innerHTML=CLOTH;
    p.appendChild(c);
    sp.appendChild(p);
  }
  let opened=false;
  function enter(){
    if(opened)return;opened=true;
    sp.classList.add("open");
    document.body.classList.remove("noscroll");
    setTimeout(()=>{sp.style.display="none"},1000);
  }
  sp.addEventListener("click",enter);
  document.body.classList.add("noscroll");
})();
</script>
</body>
</html>
